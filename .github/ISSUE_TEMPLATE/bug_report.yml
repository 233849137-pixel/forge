name: Bug report
description: Report a reproducible problem in Forge
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, and whether you used demo or local mode.
      placeholder: macOS 15, Node 20, Chrome, FORGE_DATA_MODE=demo
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell

