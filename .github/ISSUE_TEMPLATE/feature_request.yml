name: Feature request
description: Propose an improvement to Forge
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point are you trying to improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Any boundaries, tradeoffs, or non-goals?
  - type: textarea
    id: validation
    attributes:
      label: How should this be validated?
      description: What would make this feel complete or successful?

